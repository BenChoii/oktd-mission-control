<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f8fafc">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>OKTD.ca — Mission Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    /* Core palette — warm, crisp light theme */
    --bg: #F6F5F1;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E4E0D8;
    --text: #111827;
    --text-dim: #6B7280;
    --text-muted: #9CA3AF;

    /* Brand */
    --accent: #F0B429;
    --accent-hover: #E5A510;
    --accent-dark: #111827;
    --accent-light: rgba(240,180,41,0.10);

    /* Sidebar — full light */
    --sidebar-bg: #FFFFFF;
    --sidebar-border: #E4E0D8;
    --sidebar-dim: #9CA3AF;
    --sidebar-text: #374151;

    /* Status */
    --green: #059669; --green-bg: rgba(5,150,105,0.09);
    --yellow: #D97706; --yellow-bg: rgba(217,119,6,0.09);
    --orange: #EA580C; --orange-bg: rgba(234,88,12,0.09);
    --red: #DC2626; --red-bg: rgba(220,38,38,0.09);
    --blue: #2563EB; --blue-bg: rgba(37,99,235,0.09);
    --cyan: #0891B2; --cyan-bg: rgba(8,145,178,0.09);
    --pink: #DB2777;

    /* Design tokens */
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
    --shadow-lg: 0 3px 6px rgba(0,0,0,0.15), 0 2px 4px rgba(0,0,0,0.12);
    --border-width: 1px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  #root {
    width: 100%;
    height: 100%;
  }

  /* ==================== LAYOUT ==================== */
  .app-container {
    display: flex;
    height: 100%;
    overflow: hidden;
  }

  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-right: var(--border-width) solid var(--sidebar-border);
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    gap: 20px;
  }

  .main-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg);
  }

  .content-wrapper {
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ==================== SIDEBAR ==================== */
  .sidebar-header {
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
  }

  .sidebar-header:hover {
    opacity: 0.8;
  }

  .sidebar-header .icon {
    font-size: 24px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 12px;
  }

  .sidebar-nav a, .sidebar-nav button {
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--sidebar-text);
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
  }

  .sidebar-nav a:hover, .sidebar-nav button:hover {
    background: rgba(0,0,0,0.05);
  }

  .sidebar-nav a.active, .sidebar-nav button.active {
    background: var(--accent-light);
    color: var(--accent-dark);
    font-weight: 600;
  }

  .sidebar-nav .icon {
    font-size: 18px;
    width: 20px;
    text-align: center;
  }

  /* ==================== HEADER ==================== */
  .page-header {
    margin-bottom: 32px;
  }

  .page-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .page-subtitle {
    font-size: 14px;
    color: var(--text-dim);
  }

  /* ==================== CARDS ==================== */
  .card {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all 0.2s;
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(240,180,41,0.1);
  }

  .card.clickable {
    cursor: pointer;
  }

  /* ==================== GRID ==================== */
  .grid {
    display: grid;
    gap: 24px;
    margin-bottom: 32px;
  }

  .grid-2 {
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  }

  .grid-3 {
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  }

  .grid-4 {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  /* ==================== STAT CARD ==================== */
  .stat-card {
    background: var(--surface);
    border: var(--border-width) solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    margin-top: 4px;
  }

  .stat-icon {
    font-size: 32px;
    opacity: 0.7;
  }

  /* ==================== BUTTONS ==================== */
  .btn {
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(240,180,41,0.3);
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: var(--border-width) solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: var(--border-width) solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--surface2);
  }

  .btn-small {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* ==================== INPUTS ==================== */
  .input, .select {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: var(--border-width) solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .input:focus, .select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light);
  }

  .input::placeholder {
    color: var(--text-dim);
  }

  /* ==================== TABLE ==================== */
  .table {
    width: 100%;
    border-collapse: collapse;
  }

  .table th {
    background: var(--surface2);
    padding: 12px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-dim);
    border-bottom: var(--border-width) solid var(--border);
  }

  .table td {
    padding: 14px 12px;
    border-bottom: var(--border-width) solid var(--border);
  }

  .table tr:hover {
    background: var(--surface2);
  }

  /* ==================== STATUS BADGE ==================== */
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-orange { background: var(--orange-bg); color: var(--orange); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-cyan { background: var(--cyan-bg); color: var(--cyan); }

  /* ==================== MODAL ==================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.2s;
  }

  .modal-content {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 500px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s;
  }

  .modal-header {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal-footer {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ==================== ANIMATIONS ==================== */
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ==================== UTILITY ==================== */
  .flex {
    display: flex;
  }

  .flex-col {
    flex-direction: column;
  }

  .gap-1 { gap: 4px; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .gap-6 { gap: 24px; }

  .text-sm { font-size: 13px; }
  .text-base { font-size: 14px; }
  .text-lg { font-size: 16px; }
  .text-xl { font-size: 18px; }
  .text-2xl { font-size: 24px; }

  .font-normal { font-weight: 400; }
  .font-medium { font-weight: 500; }
  .font-semibold { font-weight: 600; }
  .font-bold { font-weight: 700; }

  .text-muted { color: var(--text-dim); }
  .text-secondary { color: var(--text-muted); }

  .opacity-50 { opacity: 0.5; }
  .opacity-75 { opacity: 0.75; }

  .hidden { display: none; }

  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--accent-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 768px) {
    .sidebar {
      width: 220px;
      padding: 16px 0;
    }

    .content-wrapper {
      padding: 20px;
    }

    .page-title {
      font-size: 24px;
    }

    .grid-2, .grid-3, .grid-4 {
      grid-template-columns: 1fr;
    }

    .modal-content {
      padding: 24px;
      max-width: 90%;
    }
  }

  @media (max-width: 480px) {
    .sidebar {
      width: 200px;
    }

    .content-wrapper {
      padding: 16px;
    }

    .page-title {
      font-size: 20px;
    }

    .stat-card {
      flex-direction: column;
      gap: 12px;
    }
  }

  /* ==================== SCROLLBAR ==================== */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // Mission Control Dashboard
  function MissionControl() {
    const [activeNav, setActiveNav] = useState('dashboard');
    const [agents, setAgents] = useState([]);
    const [selectedAgent, setSelectedAgent] = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    const mainContentRef = useRef(null);

    // Simulated agent data
    const mockAgents = [
      {
        id: 'research',
        name: 'Research Agent',
        status: 'active',
        uptime: 99.8,
        tasksCompleted: 1247,
        avgTaskTime: '3m 24s',
        lastCheckin: '2 seconds ago',
        health: 'healthy',
        queue: 12,
      },
      {
        id: 'outreach',
        name: 'Outreach Agent',
        status: 'active',
        uptime: 99.9,
        tasksCompleted: 2104,
        avgTaskTime: '2m 11s',
        lastCheckin: '5 seconds ago',
        health: 'healthy',
        queue: 8,
      },
      {
        id: 'builder',
        name: 'Builder Agent',
        status: 'active',
        uptime: 98.2,
        tasksCompleted: 543,
        avgTaskTime: '18m 42s',
        lastCheckin: '1 minute ago',
        health: 'healthy',
        queue: 3,
      },
      {
        id: 'closer',
        name: 'Closer Agent',
        status: 'idle',
        uptime: 100,
        tasksCompleted: 89,
        avgTaskTime: '12m 15s',
        lastCheckin: '3 minutes ago',
        health: 'healthy',
        queue: 0,
      },
    ];

    useEffect(() => {
      // Simulate loading
      setTimeout(() => {
        setAgents(mockAgents);
        setLoading(false);
      }, 800);
    }, []);

    const getStatusBadge = (status) => {
      return status === 'active' ? 'badge-green' : 'badge-cyan';
    };

    const getHealthColor = (health) => {
      return health === 'healthy' ? 'green' : health === 'warning' ? 'yellow' : 'red';
    };

    const handleAgentClick = (agent) => {
      setSelectedAgent(agent);
    };

    const handleCloseModal = () => {
      setSelectedAgent(null);
    };

    return (
      <div className="app-container">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-header">
            <span className="icon">🎯</span>
            <span>OKTD.ca</span>
          </div>

          <nav className="sidebar-nav">
            <button
              className={activeNav === 'dashboard' ? 'active' : ''}
              onClick={() => setActiveNav('dashboard')}
            >
              <span className="icon">📊</span>
              <span>Dashboard</span>
            </button>
            <button
              className={activeNav === 'agents' ? 'active' : ''}
              onClick={() => setActiveNav('agents')}
            >
              <span className="icon">🤖</span>
              <span>Agents</span>
            </button>
            <button
              className={activeNav === 'pipeline' ? 'active' : ''}
              onClick={() => setActiveNav('pipeline')}
            >
              <span className="icon">🔗</span>
              <span>Pipeline</span>
            </button>
            <button
              className={activeNav === 'logs' ? 'active' : ''}
              onClick={() => setActiveNav('logs')}
            >
              <span className="icon">📝</span>
              <span>Activity Logs</span>
            </button>
            <button
              className={activeNav === 'settings' ? 'active' : ''}
              onClick={() => setActiveNav('settings')}
            >
              <span className="icon">⚙️</span>
              <span>Settings</span>
            </button>
          </nav>
        </div>

        {/* Main Content */}
        <div className="main-content" ref={mainContentRef}>
          <div className="content-wrapper">
            {activeNav === 'dashboard' && (
              <>
                <div className="page-header">
                  <h1 className="page-title">Mission Control</h1>
                  <p className="page-subtitle">Autonomous pipeline overview and agent management</p>
                </div>

                {/* KPI Cards */}
                <div className="grid grid-4">
                  <div className="stat-card">
                    <div>
                      <div className="stat-value">4</div>
                      <div className="stat-label">Active Agents</div>
                    </div>
                    <div className="stat-icon">🤖</div>
                  </div>

                  <div className="stat-card">
                    <div>
                      <div className="stat-value">3,983</div>
                      <div className="stat-label">Tasks Completed</div>
                    </div>
                    <div className="stat-icon">✅</div>
                  </div>

                  <div className="stat-card">
                    <div>
                      <div className="stat-value">99.2%</div>
                      <div className="stat-label">Avg Uptime</div>
                    </div>
                    <div className="stat-icon">📈</div>
                  </div>

                  <div className="stat-card">
                    <div>
                      <div className="stat-value">23</div>
                      <div className="stat-label">Queued Tasks</div>
                    </div>
                    <div className="stat-icon">⏳</div>
                  </div>
                </div>

                {/* Agent Status */}
                <div style={{ marginBottom: '32px' }}>
                  <h2 style={{ fontSize: '18px', fontWeight: '600', marginBottom: '16px' }}>Agent Status</h2>
                  {loading ? (
                    <div style={{ textAlign: 'center', padding: '40px' }}>
                      <div style={{ display: 'inline-block' }} className="loading"></div>
                    </div>
                  ) : (
                    <div className="grid grid-2">
                      {agents.map((agent) => (
                        <div
                          key={agent.id}
                          className="card clickable"
                          onClick={() => handleAgentClick(agent)}
                        >
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                            <h3 style={{ fontSize: '16px', fontWeight: '600' }}>{agent.name}</h3>
                            <span className={`badge ${getStatusBadge(agent.status)}`}>
                              {agent.status}
                            </span>
                          </div>

                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '12px' }}>
                            <div>
                              <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>Uptime</div>
                              <div style={{ fontSize: '16px', fontWeight: '600' }}>{agent.uptime}%</div>
                            </div>
                            <div>
                              <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>Queue</div>
                              <div style={{ fontSize: '16px', fontWeight: '600' }}>{agent.queue} tasks</div>
                            </div>
                          </div>

                          <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                            Last check-in: {agent.lastCheckin}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Recent Activity */}
                <div>
                  <h2 style={{ fontSize: '18px', fontWeight: '600', marginBottom: '16px' }}>Recent Activity</h2>
                  <div className="card">
                    <p style={{ color: 'var(--text-dim)', fontSize: '14px' }}>
                      All systems operating normally. Last sync: Just now
                    </p>
                  </div>
                </div>
              </>
            )}

            {activeNav === 'agents' && (
              <>
                <div className="page-header">
                  <h1 className="page-title">Agents</h1>
                  <p className="page-subtitle">Manage and monitor your autonomous agents</p>
                </div>

                {loading ? (
                  <div style={{ textAlign: 'center', padding: '60px 20px' }}>
                    <div style={{ display: 'inline-block' }} className="loading"></div>
                  </div>
                ) : (
                  <div className="card">
                    <table className="table">
                      <thead>
                        <tr>
                          <th>Agent</th>
                          <th>Status</th>
                          <th>Tasks</th>
                          <th>Avg Time</th>
                          <th>Queue</th>
                        </tr>
                      </thead>
                      <tbody>
                        {agents.map((agent) => (
                          <tr key={agent.id} onClick={() => handleAgentClick(agent)} style={{ cursor: 'pointer' }}>
                            <td style={{ fontWeight: '500' }}>{agent.name}</td>
                            <td>
                              <span className={`badge ${getStatusBadge(agent.status)}`}>
                                {agent.status}
                              </span>
                            </td>
                            <td>{agent.tasksCompleted}</td>
                            <td>{agent.avgTaskTime}</td>
                            <td>{agent.queue}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </>
            )}

            {activeNav === 'pipeline' && (
              <>
                <div className="page-header">
                  <h1 className="page-title">Pipeline</h1>
                  <p className="page-subtitle">View the autonomous processing pipeline</p>
                </div>

                <div className="card">
                  <div style={{ display: 'flex', alignItems: 'center', gap: '40px', padding: '40px 20px' }}>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: '32px', marginBottom: '8px' }}>🔍</div>
                      <div style={{ fontSize: '14px', fontWeight: '500' }}>Research</div>
                    </div>

                    <div style={{ fontSize: '24px', color: 'var(--accent)' }}>→</div>

                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: '32px', marginBottom: '8px' }}>📞</div>
                      <div style={{ fontSize: '14px', fontWeight: '500' }}>Outreach</div>
                    </div>

                    <div style={{ fontSize: '24px', color: 'var(--accent)' }}>→</div>

                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: '32px', marginBottom: '8px' }}>🏗️</div>
                      <div style={{ fontSize: '14px', fontWeight: '500' }}>Build</div>
                    </div>

                    <div style={{ fontSize: '24px', color: 'var(--accent)' }}>→</div>

                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: '32px', marginBottom: '8px' }}>🤝</div>
                      <div style={{ fontSize: '14px', fontWeight: '500' }}>Close</div>
                    </div>
                  </div>
                </div>
              </>
            )}

            {activeNav === 'logs' && (
              <>
                <div className="page-header">
                  <h1 className="page-title">Activity Logs</h1>
                  <p className="page-subtitle">System and agent activity history</p>
                </div>

                <div className="card">
                  <p style={{ color: 'var(--text-dim)', fontSize: '14px' }}>
                    Logs feature coming soon. Check back later for detailed activity tracking.
                  </p>
                </div>
              </>
            )}

            {activeNav === 'settings' && (
              <>
                <div className="page-header">
                  <h1 className="page-title">Settings</h1>
                  <p className="page-subtitle">Configure Mission Control</p>
                </div>

                <div className="card">
                  <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>General Settings</h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                    <div>
                      <label style={{ display: 'block', fontSize: '14px', fontWeight: '500', marginBottom: '6px' }}>
                        Dashboard Refresh Rate
                      </label>
                      <select className="select">
                        <option>Every 5 seconds</option>
                        <option>Every 10 seconds</option>
                        <option>Every 30 seconds</option>
                      </select>
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        {/* Agent Detail Modal */}
        {selectedAgent && (
          <div className="modal-overlay" onClick={handleCloseModal}>
            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
              <div className="modal-header">
                {selectedAgent.name}
                <button
                  onClick={handleCloseModal}
                  style={{
                    position: 'absolute',
                    top: '12px',
                    right: '12px',
                    background: 'transparent',
                    border: 'none',
                    fontSize: '24px',
                    cursor: 'pointer',
                  }}
                >
                  ×
                </button>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px' }}>
                <div>
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Status</div>
                  <span className={`badge ${getStatusBadge(selectedAgent.status)}`}>
                    {selectedAgent.status}
                  </span>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Uptime</div>
                  <div style={{ fontSize: '16px', fontWeight: '600' }}>{selectedAgent.uptime}%</div>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Tasks Completed</div>
                  <div style={{ fontSize: '16px', fontWeight: '600' }}>{selectedAgent.tasksCompleted}</div>
                </div>
                <div>
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Avg Task Time</div>
                  <div style={{ fontSize: '16px', fontWeight: '600' }}>{selectedAgent.avgTaskTime}</div>
                </div>
              </div>

              <div style={{ marginBottom: '20px', padding: '12px', background: 'var(--surface2)', borderRadius: 'var(--radius-sm)' }}>
                <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>Last Check-in</div>
                <div style={{ fontSize: '14px', fontWeight: '500' }}>{selectedAgent.lastCheckin}</div>
              </div>

              <div className="modal-footer">
                <button className="btn btn-secondary" onClick={handleCloseModal}>
                  Close
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // Render app
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<MissionControl />);
</script>
</body>
</html>
