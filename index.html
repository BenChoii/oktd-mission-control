// Schedule windows for each agent (24h format) — used for gap detection & overlays
const AGENT_SCHEDULES = {
  researcher:       { startHour: 8, endHour: 18, intervalMin: 120, priority: 6 },
  builder:          { startHour: 8, endHour: 20, intervalMin: 5,   priority: 4 },
  outreach:         { startHour: 9, endHour: 19, intervalMin: 60,  priority: 2 },
  email:            { startHour: 9, endHour: 19, intervalMin: 60,  priority: 3 },
  coordinator:      { startHour: 8, endHour: 20, intervalMin: 240, priority: 5 },
  'morning-briefing': { startHour: 8, endHour: 9, intervalMin: 1440, priority: 7 },
  enrichment:       { startHour: 0, endHour: 24, intervalMin: 0,   priority: 8 },
};

function HeartbeatTimeline({ agentStates, logs, agentsDashboard, onNavigate }) {
  const now = Date.now();
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [hoveredBlock, setHoveredBlock] = useState(null);
  const agentIds = Object.keys(AGENT_META);
  const todayStart = new Date(now); todayStart.setHours(0, 0, 0, 0);
  const todayMs = todayStart.getTime();
  const DAY_MS = 24 * 60 * 60 * 1000;

  // Parse all logs into structured activity
  const agentActivity = useMemo(() => {
    const map = {};
    agentIds.forEach(id => { map[id] = []; });
    (logs || []).forEach(l => {
      const logTime = new Date(l._creationTime || l.createdAt || l.timestamp || 0).getTime();
      if (logTime >= todayMs) {
        const logType = (l.type || l.status || 'info').toLowerCase();
        const severity = logType === 'error' || logType === 'fail' ? 'error' : logType === 'warn' ? 'warn' : 'ok';
        map[l.agentId]?.push({ time: logTime, severity, text: l.text || l.message || '' });
      }
    });
    // Sort by time
    Object.values(map).forEach(arr => arr.sort((a, b) => a.time - b.time));
    return map;
  }, [logs, todayMs]);

  // Detect gaps: periods where agent SHOULD have run but didn't
  const gapAlerts = useMemo(() => {
    const alerts = [];
    const currentHour = new Date(now).getHours();
    agentIds.forEach(agentId => {
      const sched = AGENT_SCHEDULES[agentId];
      if (!sched || sched.intervalMin === 0) return; // skip on-demand agents
      const activities = agentActivity[agentId] || [];
      if (currentHour < sched.startHour) return; // haven't started yet today

      const windowEnd = Math.min(currentHour, sched.endHour);
      if (activities.length === 0 && currentHour >= sched.startHour + 1) {
        alerts.push({ agentId, type: 'no_activity', severity: 'error',
          text: `${AGENT_META[agentId].name} has zero activity today (should run every ${sched.intervalMin}min from ${sched.startHour}:00)` });
        return;
      }

      // Check for gaps > 2x the expected interval
      const lastActivity = activities.length > 0 ? activities[activities.length - 1].time : null;
      if (lastActivity && (now - lastActivity) > sched.intervalMin * 2 * 60000 && currentHour >= sched.startHour && currentHour < sched.endHour) {
        const gapMin = Math.round((now - lastActivity) / 60000);
        alerts.push({ agentId, type: 'stale', severity: 'warn',
          text: `${AGENT_META[agentId].name} last ran ${gapMin}min ago (expected every ${sched.intervalMin}min)` });
      }
    });
    return alerts;
  }, [agentActivity, now]);

  // Surface critical agent messages (conversion gates, manual action needed)
  const criticalAlerts = useMemo(() => {
    const alerts = [];
    const stats = agentsDashboard?.agentStats || [];
    stats.forEach(stat => {
      const summary = stat.lastRunSummary || '';
      if (/CONVERSION GATE|Ben should|building paused/i.test(summary)) {
        const name = AGENT_META[stat.agentId]?.name || stat.agentId;
        alerts.push({ agentId: stat.agentId, summary, name });
      }
    });
    return alerts;
  }, [agentsDashboard]);

  // Session capacity estimate (running agents right now)
  const runningCount = useMemo(() => {
    return (agentsDashboard?.agentStats || []).filter(s => s.status === 'running').length;
  }, [agentsDashboard]);
  const maxSessions = 3; // our effective limit

  const getAgentStatus = (agentId) => {
    const stat = (agentsDashboard?.agentStats || []).find(s => s.agentId === agentId);
    const isPaused = stat?.isPaused;
    if (isPaused) return 'paused';
    return stat?.status || 'idle';
  };

  const hours = Array.from({ length: 24 }, (_, i) => i);

  return (
    <div className="heartbeat-container">
      <div className="heartbeat-title">
        💓 Agent Heartbeat
        <span style={{ fontSize: '12px', color: 'var(--text-dim)', fontWeight: 400, marginLeft: 'auto' }}>
          {new Date(now).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
        </span>
      </div>
      <div className="heartbeat-subtitle">
        24-hour swim lane view — yellow bands show scheduled windows, red hatching shows missed runs
      </div>

{/* Critical agent alerts — conversion gates, manual action needed */}
      {criticalAlerts.length > 0 && (
        <div style={{ marginBottom: '12px' }}>
          {criticalAlerts.map((a, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'flex-start', gap: '10px',
              background: 'rgba(220,38,38,0.08)', border: '1px solid rgba(220,38,38,0.25)',
              borderRadius: '8px', padding: '12px 16px', marginBottom: '8px'
            }}>
              <span style={{ fontSize: '18px', lineHeight: 1 }}>🚨</span>
              <div>
                <div style={{ fontSize: '12px', fontWeight: 700, color: 'var(--red)', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Action Required — {a.name}</div>
                <div style={{ fontSize: '13px', color: 'var(--text)', lineHeight: 1.5 }}>{a.summary}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Gap alerts */}
      {gapAlerts.length > 0 && (
        <div className="heartbeat-alerts">
          {gapAlerts.map((a, i) => (
            <div key={i} className={`heartbeat-alert ${a.severity}`}>
              {a.severity === 'error' ? '🚨' : '⚠️'} {a.text}
            </div>
          ))}
        </div>
      )}

      {/* Session capacity bar */}
      <div className="heartbeat-capacity">
        <div className="heartbeat-capacity-label">Sessions: {runningCount}/{maxSessions}</div>
        <div className="heartbeat-capacity-bar">
          <div className="heartbeat-capacity-fill" style={{
            width: `${Math.min((runningCount / maxSessions) * 100, 100)}%`,
            background: runningCount >= maxSessions ? 'var(--red)' : runningCount >= 2 ? 'var(--yellow)' : 'var(--green)',
          }} />
        </div>
        <div style={{ fontSize: '11px', color: runningCount >= maxSessions ? 'var(--red)' : 'var(--text-dim)', fontWeight: 600 }}>
          {runningCount >= maxSessions ? '⚠️ At capacity — agents may be starved' : runningCount === 0 ? 'All idle' : `${maxSessions - runningCount} slots free`}
        </div>
      </div>

      {/* Hour header */}
      <div style={{ display: 'flex', marginBottom: '0' }}>
        <div style={{ minWidth: '180px' }}></div>
        <div style={{ flex: 1, display: 'flex' }}>
          {hours.map(h => (
            <div key={h} style={{ flex: 1, textAlign: 'center', fontSize: '9px', color: 'var(--text-dim)', fontWeight: h % 3 === 0 ? 700 : 400, paddingBottom: '4px' }}>
              {h % 3 === 0 ? `${String(h).padStart(2, '0')}:00` : ''}
            </div>
          ))}
        </div>
      </div>

      {/* Timeline rows */}
      <div className="heartbeat-timeline">
        {agentIds.map(agentId => {
          const meta = AGENT_META[agentId];
          const status = getAgentStatus(agentId);
          const sched = AGENT_SCHEDULES[agentId] || {};
          const activities = agentActivity[agentId] || [];
          const runCount = activities.length;
          const errorCount = activities.filter(a => a.severity === 'error').length;
          const isStale = gapAlerts.some(a => a.agentId === agentId);
          const isSelected = selectedAgent === agentId;

          return (
            <div key={agentId} className={`heartbeat-row ${isSelected ? 'selected' : ''}`}
              onClick={() => setSelectedAgent(isSelected ? null : agentId)}>
              <div className="heartbeat-agent-label">
                <div className="heartbeat-agent-icon">{meta.icon}</div>
                <div className="heartbeat-agent-name">
                  <div className="heartbeat-agent-name-text">{meta.name}</div>
                  <div className={`heartbeat-agent-status ${status === 'running' ? 'running' : isStale ? 'stale' : ''}`}>
                    {status === 'running' ? '⏱️ running' : status === 'paused' ? '⏸ paused' : isStale ? '⏰ overdue' : status}
                  </div>
                  <div className="heartbeat-agent-runs">
                    {runCount} run{runCount !== 1 ? 's' : ''} today{errorCount > 0 ? ` · ${errorCount} err` : ''}
                  </div>
                </div>
              </div>
              <div className="heartbeat-chart">
                <div className="heartbeat-hour-grid">
                  {hours.map(h => (
                    <div key={h} className="heartbeat-hour"></div>
                  ))}
                </div>
                <div className="heartbeat-blocks">
                  {/* Schedule window overlay */}
                  {sched.startHour !== undefined && sched.intervalMin > 0 && (
                    <div className="heartbeat-schedule-bg" style={{
                      left: `${(sched.startHour / 24) * 100}%`,
                      width: `${((sched.endHour - sched.startHour) / 24) * 100}%`,
                    }} />
                  )}
                  {/* Activity blocks colored by severity */}
                  {activities.slice(0, 50).map((act, i) => {
                    const percent = ((act.time - todayMs) / DAY_MS) * 100;
                    return (
                      <div
                        key={i}
                        className={`heartbeat-activity-block ${act.severity}`}
                        style={{
                          left: `${percent}%`,
                          width: '1%',
                          minWidth: '4px',
                          animation: status === 'running' && i === activities.length - 1 ? 'pulse 1.5s infinite' : 'none',
                        }}
                        title={`${new Date(act.time).toLocaleTimeString()} — ${act.text.substring(0, 80)}`}
                        onMouseEnter={() => setHoveredBlock({ agentId, index: i })}
                        onMouseLeave={() => setHoveredBlock(null)}
                        onClick={(e) => e.stopPropagation()}
                      />
                    );
                  })}
                  {/* Current time marker */}
                  <div className="heartbeat-current-time" style={{
                    left: `${((now - todayMs) / DAY_MS) * 100}%`,
                  }} />
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Detail panel for selected agent */}
      {selectedAgent && (
        <div className="heartbeat-detail-panel">
          <div className="heartbeat-detail-title">
            {AGENT_META[selectedAgent]?.icon} {AGENT_META[selectedAgent]?.name} — Today's Activity Log
            <span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)', marginLeft: 'auto', cursor: 'pointer' }}
              onClick={() => setSelectedAgent(null)}>✕ close</span>
          </div>
          {(agentActivity[selectedAgent] || []).length === 0 ? (
            <div style={{ color: 'var(--text-dim)', fontSize: '12px', padding: '12px 0' }}>No activity recorded today</div>
          ) : (
            (agentActivity[selectedAgent] || []).slice(-15).reverse().map((act, i) => (
              <div key={i} className="heartbeat-detail-log">
                <span className="heartbeat-detail-time">{new Date(act.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                <span style={{ color: act.severity === 'error' ? 'var(--red)' : act.severity === 'warn' ? 'var(--yellow)' : 'var(--text)' }}>
                  {act.severity === 'error' ? '❌' : act.severity === 'warn' ? '⚠️' : '✅'}
                </span>
                <span style={{ flex: 1 }}>{act.text.substring(0, 120)}</span>
              </div>
            ))
          )}
        </div>
      )}

      <div className="heartbeat-legend">
        <div className="heartbeat-legend-item">
          <div className="heartbeat-legend-dot" style={{ background: 'var(--green)' }}></div> Success
        </div>
        <div className="heartbeat-legend-item">
          <div className="heartbeat-legend-dot" style={{ background: 'var(--yellow)' }}></div> Warning
        </div>
        <div className="heartbeat-legend-item">
          <div className="heartbeat-legend-dot" style={{ background: 'var(--red)' }}></div> Error
        </div>
        <div className="heartbeat-legend-item">
          <div style={{ width: '12px', height: '12px', background: 'rgba(245,194,24,0.08)', border: '1px dashed rgba(245,194,24,0.4)', borderRadius: '2px' }}></div> Scheduled window
        </div>
        <div className="heartbeat-legend-item">
          <div style={{ width: '8px', height: '8px', background: 'var(--red)', borderRadius: '50%' }}></div> Now
        </div>
      </div>
    </div>
  );
}

// ==================== PIPELINE FLOW V2 ====================
function PipelineFlow({ prospects, messages }) {
  const [selectedStage, setSelectedStage] = useState(null);

  const stages = ['prospected', 'building', 'deployed', 'opener_sent', 'opener_replied', 'pitch_sent', 'email_sent', 'call_ready', 'won'];
  const stageLabels = {
    prospected: 'Researched', building: 'Building', deployed: 'Deployed',
    opener_sent: 'SMS Sent', opener_replied: 'Replied', pitch_sent: 'Pitched',
    email_sent: 'Emailed', call_ready: 'Call Ready', won: 'Won',
  };
  const stageIcons = {
    prospected: '🔍', building: '🏗️', deployed: '🚀', opener_sent: '📱',
    opener_replied: '💬', pitch_sent: '🎯', email_sent: '📧', call_ready: '☎️', won: '🎉',
  };
  // Which agent is responsible for moving prospects INTO each stage
  const stageAgent = {
    prospected: 'Research', building: 'Builder', deployed: 'Builder',
    opener_sent: 'Outreach', opener_replied: 'Prospect', pitch_sent: 'Outreach',
    email_sent: 'Email', call_ready: 'Closer', won: 'Ben',
  };

  // CUMULATIVE counts: how many prospects have reached OR passed each stage
  const { counts, cumulativeCounts } = useMemo(() => {
    const stageOrder = {};
    stages.forEach((s, i) => { stageOrder[s] = i; });
    // Also count lost/flagged at their highest reached stage
    const currentCounts = {};
    stages.forEach(s => { currentCounts[s] = 0; });
    const lostCount = { total: 0 };
    const flaggedCount = { total: 0 };

    (prospects || []).forEach(p => {
      if (p.stage === 'lost') { lostCount.total++; return; }
      if (p.stage === 'flagged') { flaggedCount.total++; }
      if (currentCounts[p.stage] !== undefined) currentCounts[p.stage]++;
    });

    // Cumulative: everything at this stage or beyond
    const cumul = {};
    let running = 0;
    for (let i = stages.length - 1; i >= 0; i--) {
      running += currentCounts[stages[i]];
      cumul[stages[i]] = running;
    }

    return { counts: currentCounts, cumulativeCounts: cumul, lostCount: lostCount.total, flaggedCount: flaggedCount.total };
  }, [prospects]);

  // Conversion rates: cumulative-based (what % of prospects reaching stage X also reach stage X+1)
  const conversions = useMemo(() => {
    const conv = {};
    for (let i = 0; i < stages.length - 1; i++) {
      const from = cumulativeCounts[stages[i]] || 1;
      const to = cumulativeCounts[stages[i + 1]] || 0;
      conv[`${stages[i]}-${stages[i + 1]}`] = Math.round((to / from) * 100);
    }
    return conv;
  }, [cumulativeCounts]);

  // Find the biggest bottleneck (largest absolute drop-off)
  const bottleneck = useMemo(() => {
    let maxDrop = 0, maxStage = null;
    for (let i = 0; i < stages.length - 1; i++) {
      const drop = (cumulativeCounts[stages[i]] || 0) - (cumulativeCounts[stages[i + 1]] || 0);
      if (drop > maxDrop) { maxDrop = drop; maxStage = stages[i]; }
    }
    return maxStage;
  }, [cumulativeCounts]);

  // Average time in each stage (rough estimate from creation timestamps)
  const avgTimeInStage = useMemo(() => {
    const times = {};
    stages.forEach(s => { times[s] = null; });
    // Use creation time as proxy for when they entered the pipeline
    const now = Date.now();
    const byStage = {};
    stages.forEach(s => { byStage[s] = []; });
    (prospects || []).forEach(p => {
      if (byStage[p.stage]) {
        const created = p._creationTime || p.createdAt || 0;
        if (created) byStage[p.stage].push(now - created);
      }
    });
    stages.forEach(s => {
      const arr = byStage[s];
      if (arr.length > 0) {
        const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
        const hours = Math.round(avg / 3600000);
        times[s] = hours < 24 ? `${hours}h` : `${Math.round(hours / 24)}d`;
      }
    });
    return times;
  }, [prospects]);

  const getColor = (percent) => {
    if (percent >= 50) return 'var(--green)';
    if (percent >= 20) return 'var(--yellow)';
    return 'var(--red)';
  };

  const getClass = (percent) => {
    if (percent >= 50) return 'healthy';
    if (percent >= 20) return 'warning';
    return 'critical';
  };

  const total = (prospects || []).length;
  const lostProspects = (prospects || []).filter(p => p.stage === 'lost').length;
  const flaggedProspects = (prospects || []).filter(p => p.stage === 'flagged').length;
  const smsOut = (messages || []).filter(m => m.direction === 'outbound').length;
  const smsIn = (messages || []).filter(m => m.direction === 'inbound').length;

  return (
    <div className="flow-container">
      <div className="flow-title">🔀 Pipeline Flow</div>
      <div className="flow-subtitle">
        Cumulative conversion funnel — click any stage to see prospects. Bottleneck highlighted in red.
      </div>

      {/* Summary cards */}
      <div className="flow-summary-cards">
        <div className="flow-summary-card">
          <div className="flow-summary-card-value">{total}</div>
          <div className="flow-summary-card-label">Total Prospects</div>
        </div>
        <div className="flow-summary-card">
          <div className="flow-summary-card-value" style={{ color: 'var(--green)' }}>{smsOut}</div>
          <div className="flow-summary-card-label">SMS Sent</div>
        </div>
        <div className="flow-summary-card">
          <div className="flow-summary-card-value" style={{ color: 'var(--blue)' }}>{smsIn}</div>
          <div className="flow-summary-card-label">Replies</div>
        </div>
        <div className="flow-summary-card">
          <div className="flow-summary-card-value" style={{ color: 'var(--yellow)' }}>{flaggedProspects}</div>
          <div className="flow-summary-card-label">Flagged</div>
        </div>
        <div className="flow-summary-card">
          <div className="flow-summary-card-value" style={{ color: 'var(--red)' }}>{lostProspects}</div>
          <div className="flow-summary-card-label">Lost</div>
        </div>
      </div>

      {/* Flow diagram */}
      <div className="flow-diagram">
        {stages.map((stage, idx) => {
          const convKey = `${stage}-${stages[idx + 1]}`;
          const convPct = conversions[convKey] || 0;
          const isBottleneck = stage === bottleneck;
          const isSelected = selectedStage === stage;

          return (
            <React.Fragment key={stage}>
              <div className={`flow-node ${isSelected ? 'selected' : ''}`} onClick={() => setSelectedStage(isSelected ? null : stage)}>
                <div className={`flow-node-box ${isBottleneck ? 'bottleneck' : idx < stages.length - 1 ? getClass(convPct) : 'healthy'}`}>
                  <div className="flow-node-icon">{stageIcons[stage]}</div>
                  <div className="flow-node-name">{stageLabels[stage]}</div>
                  <div className="flow-node-count">{counts[stage]}</div>
                  <div className="flow-node-cumulative">({cumulativeCounts[stage]} reached)</div>
                  {avgTimeInStage[stage] && (
                    <div className="flow-node-time">avg {avgTimeInStage[stage]} in stage</div>
                  )}
                </div>
                {isBottleneck && (
                  <div className="flow-bottleneck-badge">⚠️ Bottleneck</div>
                )}
              </div>

              {idx < stages.length - 1 && (
                <div className="flow-arrow" style={{ borderColor: getColor(convPct) }}>
                  <div className="flow-arrow-label" style={{ color: getColor(convPct) }}>
                    {convPct}%
                  </div>
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Stage detail panel — shows prospects in selected stage */}
      {selectedStage && (
        <div className="flow-detail-panel">
          <div className="flow-detail-title">
            {stageIcons[selectedStage]} {stageLabels[selectedStage]} — {counts[selectedStage]} prospects currently here
            <span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)', marginLeft: '8px' }}>
              (Moved here by: {stageAgent[selectedStage]})
            </span>
            <span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)', marginLeft: 'auto', cursor: 'pointer' }}
              onClick={() => setSelectedStage(null)}>✕ close</span>
          </div>
          {(prospects || []).filter(p => p.stage === selectedStage).length === 0 ? (
            <div style={{ color: 'var(--text-dim)', fontSize: '12px', padding: '8px 0' }}>No prospects in this stage</div>
          ) : (
            (prospects || []).filter(p => p.stage === selectedStage).slice(0, 20).map((p, i) => (
              <div key={i} className="flow-prospect-row">
                <span style={{ fontWeight: 600 }}>{p.name}</span>
                <span style={{ color: 'var(--text-dim)' }}>{p.city || p.location || ''}</span>
                <span style={{ color: 'var(--text-dim)', fontSize: '11px' }}>{p.phone || ''}</span>
                {p.vercelUrl && (
                  <a href={p.vercelUrl} target="_blank" rel="noopener" style={{ color: 'var(--blue)', fontSize: '11px', textDecoration: 'none' }}>
                    🌐 site
                  </a>
                )}
                <span style={{ color: 'var(--text-dim)', fontSize: '10px' }}>{timeAgo(p._creationTime || p.createdAt)}</span>
              </div>
            ))
          )}
          {(prospects || []).filter(p => p.stage === selectedStage).length > 20 && (
            <div style={{ color: 'var(--text-dim)', fontSize: '11px', padding: '8px 0' }}>
              + {(prospects || []).filter(p => p.stage === selectedStage).length - 20} more...
            </div>
          )}
        </div>
      )}

      {/* Drop-off funnel bar */}
      <div className="flow-dropout">
        <div className="flow-dropout-title">📊 Stage-by-Stage Drop-off</div>
        {stages.map((stage, idx) => {
          const pct = total > 0 ? Math.round((cumulativeCounts[stage] / total) * 100) : 0;
          return (
            <div key={stage} className="flow-dropout-row">
              <div className="flow-funnel-label" style={{ minWidth: '80px', fontSize: '11px', fontWeight: 600 }}>{stageLabels[stage]}</div>
              <div className="flow-dropout-bar-bg">
                <div className="flow-dropout-bar-fill" style={{
                  width: `${pct}%`,
                  background: idx === 0 ? 'var(--accent)' : stage === 'won' ? 'var(--green)' : 'var(--blue)',
                }} />
              </div>
              <div style={{ minWidth: '50px', fontSize: '11px', fontWeight: 700, textAlign: 'right' }}>{cumulativeCounts[stage]}</div>
              <div style={{ minWidth: '40px', fontSize: '11px', color: 'var(--text-dim)', textAlign: 'right' }}>{pct}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ==================== WIN RATE TRENDS V2 ====================
function WinRateTrends({ prospects, messages }) {
  const allProspects = prospects || [];
  const allMessages = messages || [];
  const total = allProspects.length;
  const active = allProspects.filter(p => p.stage !== 'lost');

  // ---- Core Metrics ----
  const wonCount = allProspects.filter(p => p.stage === 'won').length;
  const lostCount = allProspects.filter(p => p.stage === 'lost').length;
  const flaggedCount = allProspects.filter(p => p.stage === 'flagged').length;
  const callReady = allProspects.filter(p => p.stage === 'call_ready').length;

  // Contacted = anyone who's been sent an opener or beyond
  const contactedStages = ['opener_sent', 'opener_replied', 'pitch_sent', 'email_sent', 'email_replied', 'call_ready', 'won', 'lost', 'flagged'];
  const contacted = allProspects.filter(p => contactedStages.includes(p.stage)).length;
  const deployed = allProspects.filter(p => !['prospected', 'building'].includes(p.stage)).length;

  // Reply analysis
  const smsOutbound = allMessages.filter(m => m.direction === 'outbound' && (m.messageType === 'opener' || m.messageType === 'pitch')).length;
  const smsInbound = allMessages.filter(m => m.direction === 'inbound').length;
  const replied = allProspects.filter(p => ['opener_replied', 'pitch_sent', 'call_ready', 'won'].includes(p.stage)).length;

  const winRate = total > 0 ? ((wonCount / total) * 100).toFixed(1) : '0.0';
  const replyRate = contacted > 0 ? ((replied / contacted) * 100).toFixed(1) : '0.0';
  const contactRate = total > 0 ? ((contacted / total) * 100).toFixed(1) : '0.0';
  const buildRate = total > 0 ? ((deployed / total) * 100).toFixed(1) : '0.0';
  const closeRate = replied > 0 ? ((wonCount / replied) * 100).toFixed(1) : '0.0';

  // ---- Revenue Projection ----
  const MRR_PER_CLIENT = 99;
  const currentMRR = wonCount * MRR_PER_CLIENT;
  const pipelineMRR = callReady * MRR_PER_CLIENT; // call_ready = likely to close
  const projectedMRR = currentMRR + pipelineMRR;
  const annualRun = currentMRR * 12;

  // ---- Funnel data (cumulative) ----
  const funnelStages = [
    { key: 'total', label: 'Researched', count: total, color: 'var(--text-dim)' },
    { key: 'deployed', label: 'Site Built', count: deployed, color: 'var(--cyan)' },
    { key: 'contacted', label: 'Contacted', count: contacted, color: 'var(--blue)' },
    { key: 'replied', label: 'Replied', count: replied, color: 'var(--accent)' },
    { key: 'call_ready', label: 'Call Ready', count: callReady, color: 'var(--orange)' },
    { key: 'won', label: 'Won', count: wonCount, color: 'var(--green)' },
  ];

  // ---- Activity Heatmap (messages per day for last 14 days) ----
  const heatmapData = useMemo(() => {
    const days = [];
    const now = Date.now();
    for (let i = 13; i >= 0; i--) {
      const dayStart = new Date(now - i * 86400000);
      dayStart.setHours(0, 0, 0, 0);
      const dayEnd = new Date(dayStart.getTime() + 86400000);
      const outbound = allMessages.filter(m => {
        const t = m.sentAt || m._creationTime || 0;
        return t >= dayStart.getTime() && t < dayEnd.getTime() && m.direction === 'outbound';
      }).length;
      const inbound = allMessages.filter(m => {
        const t = m.sentAt || m._creationTime || 0;
        return t >= dayStart.getTime() && t < dayEnd.getTime() && m.direction === 'inbound';
      }).length;
      days.push({
        date: dayStart,
        label: dayStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        dayLabel: dayStart.toLocaleDateString('en-US', { weekday: 'short' }),
        outbound,
        inbound,
        total: outbound + inbound,
      });
    }
    return days;
  }, [allMessages]);

  const maxActivity = Math.max(...heatmapData.map(d => d.total), 1);

  // ---- Cohort: prospects by creation date ----
  const cohorts = useMemo(() => {
    const buckets = {};
    allProspects.forEach(p => {
      const created = p._creationTime || p.createdAt || 0;
      if (!created) return;
      const d = new Date(created);
      const key = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (!buckets[key]) buckets[key] = { date: key, total: 0, contacted: 0, replied: 0, won: 0 };
      buckets[key].total++;
      if (contactedStages.includes(p.stage)) buckets[key].contacted++;
      if (['opener_replied', 'pitch_sent', 'call_ready', 'won'].includes(p.stage)) buckets[key].replied++;
      if (p.stage === 'won') buckets[key].won++;
    });
    return Object.values(buckets).slice(-7); // last 7 cohort days
  }, [allProspects]);

  return (
    <div className="trends-container">
      <div className="trends-title">📈 Pipeline Analytics</div>
      <div className="trends-subtitle">
        Real-time conversion metrics, revenue projection, and cohort analysis
      </div>

      {/* KPI Cards */}
      <div className="trends-metrics-grid">
        <div className="trends-metric-card highlight">
          <div className="trends-metric-label">Win Rate</div>
          <div className="trends-metric-value" style={{ color: wonCount > 0 ? 'var(--green)' : 'var(--text-dim)' }}>{winRate}%</div>
          <div className="trends-metric-change">{wonCount} won of {total}</div>
        </div>
        <div className="trends-metric-card">
          <div className="trends-metric-label">Reply Rate</div>
          <div className="trends-metric-value" style={{ color: 'var(--blue)' }}>{replyRate}%</div>
          <div className="trends-metric-change">{replied} replied of {contacted} contacted</div>
        </div>
        <div className="trends-metric-card">
          <div className="trends-metric-label">Build Rate</div>
          <div className="trends-metric-value" style={{ color: 'var(--cyan)' }}>{buildRate}%</div>
          <div className="trends-metric-change">{deployed} built of {total}</div>
        </div>
        <div className="trends-metric-card">
          <div className="trends-metric-label">Contact Rate</div>
          <div className="trends-metric-value">{contactRate}%</div>
          <div className="trends-metric-change">{contacted} of {total} texted</div>
        </div>
        <div className="trends-metric-card">
          <div className="trends-metric-label">Close Rate</div>
          <div className="trends-metric-value" style={{ color: 'var(--green)' }}>{closeRate}%</div>
          <div className="trends-metric-change">{wonCount} won of {replied} engaged</div>
        </div>
        <div className="trends-metric-card">
          <div className="trends-metric-label">Flagged / Lost</div>
          <div className="trends-metric-value" style={{ color: 'var(--yellow)' }}>{flaggedCount} / {lostCount}</div>
          <div className="trends-metric-change">Need attention / dropped</div>
        </div>
      </div>

      {/* Revenue Projection */}
      <div className="trends-revenue-card">
        <div className="trends-revenue-title">💰 Revenue Tracker</div>
        <div className="trends-revenue-subtitle">Based on $99/mo per client</div>
        <div className="trends-revenue-grid">
          <div className="trends-revenue-item">
            <div className="trends-revenue-item-value" style={{ color: 'var(--green)' }}>${currentMRR}</div>
            <div className="trends-revenue-item-label">Current MRR</div>
          </div>
          <div className="trends-revenue-item">
            <div className="trends-revenue-item-value" style={{ color: 'var(--accent)' }}>${pipelineMRR}</div>
            <div className="trends-revenue-item-label">Pipeline MRR (Call Ready)</div>
          </div>
          <div className="trends-revenue-item">
            <div className="trends-revenue-item-value" style={{ color: 'var(--blue)' }}>${projectedMRR}</div>
            <div className="trends-revenue-item-label">Projected MRR</div>
          </div>
          <div className="trends-revenue-item">
            <div className="trends-revenue-item-value">${annualRun.toLocaleString()}</div>
            <div className="trends-revenue-item-label">Annual Run Rate</div>
          </div>
        </div>
        {/* Progress bar to $30K MRR goal */}
        <div style={{ marginTop: '16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px', marginBottom: '4px' }}>
            <span style={{ color: 'var(--text-dim)' }}>Progress to $30K MRR goal</span>
            <span style={{ fontWeight: 700 }}>{((projectedMRR / 30000) * 100).toFixed(1)}%</span>
          </div>
          <div style={{ height: '8px', background: 'var(--surface2)', borderRadius: '4px', overflow: 'hidden' }}>
            <div style={{
              height: '100%', borderRadius: '4px',
              width: `${Math.min((projectedMRR / 30000) * 100, 100)}%`,
              background: 'linear-gradient(90deg, var(--accent), var(--green))',
              transition: 'width 0.5s ease-out',
            }} />
          </div>
        </div>
      </div>

      {/* Conversion Funnel */}
      <div className="trends-funnel-card">
        <div className="trends-funnel-title">🔻 Conversion Funnel</div>
        {funnelStages.map((stage, i) => {
          const pct = total > 0 ? Math.round((stage.count / total) * 100) : 0;
          return (
            <div key={stage.key} className="trends-funnel-row">
              <div className="trends-funnel-label">{stage.label}</div>
              <div className="trends-funnel-bar-bg">
                <div className="trends-funnel-bar-fill" style={{
                  width: `${pct}%`,
                  background: stage.color,
                }} />
              </div>
              <div className="trends-funnel-count">{stage.count}</div>
              <div className="trends-funnel-pct">{pct}%</div>
            </div>
          );
        })}
      </div>

      {/* Activity Heatmap */}
      <div className="trends-chart-card">
        <div style={{ fontSize: '14px', fontWeight: 700, marginBottom: '16px' }}>📊 14-Day Activity</div>
        <div style={{ display: 'flex', gap: '4px', alignItems: 'flex-end', height: '120px', padding: '0 4px' }}>
          {heatmapData.map((day, i) => {
            const outH = day.total > 0 ? Math.max((day.outbound / maxActivity) * 100, 4) : 0;
            const inH = day.total > 0 ? Math.max((day.inbound / maxActivity) * 100, 4) : 0;
            return (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '90px', width: '100%', gap: '1px' }}>
                  <div style={{ height: `${outH}%`, background: 'var(--blue)', borderRadius: '3px 3px 0 0', minHeight: day.outbound > 0 ? '2px' : '0' }}
                    title={`${day.label}: ${day.outbound} sent`} />
                  <div style={{ height: `${inH}%`, background: 'var(--green)', borderRadius: '0 0 3px 3px', minHeight: day.inbound > 0 ? '2px' : '0' }}
                    title={`${day.label}: ${day.inbound} received`} />
                </div>
                <div style={{ fontSize: '9px', color: 'var(--text-dim)', textAlign: 'center', lineHeight: '1.2' }}>
                  {day.dayLabel}<br/>{day.label}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ display: 'flex', gap: '16px', marginTop: '12px', fontSize: '11px', color: 'var(--text-dim)' }}>
          <span><span style={{ display: 'inline-block', width: '10px', height: '10px', background: 'var(--blue)', borderRadius: '2px', marginRight: '4px' }}></span>Outbound</span>
          <span><span style={{ display: 'inline-block', width: '10px', height: '10px', background: 'var(--green)', borderRadius: '2px', marginRight: '4px' }}></span>Inbound</span>
        </div>
      </div>

      {/* Cohort Table */}
      {cohorts.length > 0 && (
        <div className="trends-cohort-card">
          <div className="trends-cohort-title">👥 Daily Cohort Performance</div>
          <table className="trends-table">
            <thead>
              <tr>
                <th>Cohort Date</th>
                <th>Researched</th>
                <th>Contacted</th>
                <th>Replied</th>
                <th>Won</th>
                <th>Reply %</th>
              </tr>
            </thead>
            <tbody>
              {cohorts.map((c, i) => (
                <tr key={i}>
                  <td style={{ fontWeight: 600 }}>{c.date}</td>
                  <td>{c.total}</td>
                  <td>{c.contacted}</td>
                  <td style={{ color: c.replied > 0 ? 'var(--green)' : 'var(--text-dim)' }}>{c.replied}</td>
                  <td style={{ color: c.won > 0 ? 'var(--green)' : 'var(--text-dim)', fontWeight: c.won > 0 ? 800 : 400 }}>{c.won}</td>
                  <td style={{ fontWeight: 700, color: c.contacted > 0 && c.replied > 0 ? 'var(--blue)' : 'var(--text-dim)' }}>
                    {c.contacted > 0 ? Math.round((c.replied / c.contacted) * 100) : 0}%
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ==================== MOUNT ====================
ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
