// ==================== AGENT ACTIVITY BAR ====================
function AgentActivityBar({ agentDashboard, agentStates, logs }) {
  const AGENTS = [
    { id: 'researcher', name: 'Scout', icon: '🔍', intervalSec: 600 },
    { id: 'builder', name: 'Builder', icon: '🏗️', intervalSec: 300 },
    { id: 'outreach', name: 'Outreach', icon: '📱', intervalSec: 600 },
    { id: 'closer', name: 'Closer', icon: '🤖', intervalSec: 180 },
    { id: 'email', name: 'Email', icon: '📧', intervalSec: 3600 },
  ];

  const [timers, setTimers] = useState({});

  const getAgentInfo = useCallback((agentId) => {
    const dashItem = (agentDashboard || []).find(d => d.agentId === agentId);
    const stateItem = (agentStates || []).find(s => s.agentId === agentId);
    const agentLogs = (logs || []).filter(l => l.agentId === agentId).slice(0, 3);
    return { ...(stateItem || {}), ...(dashItem || {}), recentLogs: dashItem?.recentLogs || agentLogs };
  }, [agentDashboard, agentStates, logs]);

  // Countdown + elapsed timer — uses log timestamps as proxy for last run
  useEffect(() => {
    const tick = () => {
      const t = {};
      AGENTS.forEach(agent => {
        const info = getAgentInfo(agent.id);
        // Use lastRunAt from Convex state, OR fall back to most recent log timestamp
        const lastActivity = info.lastRunAt || (info.recentLogs?.[0]?.timestamp) || null;

        if (info.status === 'running' && lastActivity) {
          const secs = Math.floor((Date.now() - lastActivity) / 1000);
          const m = Math.floor(secs / 60);
          const s = secs % 60;
          t[agent.id] = { elapsed: `${m}:${s.toString().padStart(2, '0')}`, countdown: null, pct: null };
        } else if (lastActivity) {
          // Add ~2 min jitter buffer — scheduled tasks have dispatch jitter
          const jitterBuffer = 120;
          const nextRun = lastActivity + ((agent.intervalSec + jitterBuffer) * 1000);
          const remaining = Math.max(0, Math.floor((nextRun - Date.now()) / 1000));
          const totalInterval = agent.intervalSec + jitterBuffer;
          const m = Math.floor(remaining / 60);
          const s = remaining % 60;
          const pct = Math.min(100, Math.max(0, ((totalInterval - remaining) / totalInterval) * 100));
          t[agent.id] = {
            elapsed: null,
            countdown: remaining > 0 ? `${m}:${s.toString().padStart(2, '0')}` : 'soon',
            pct: pct,
          };
        }
      });
      setTimers(t);
    };
    tick();
    const interval = setInterval(tick, 1000);
    return () => clearInterval(interval);
  }, [getAgentInfo]);

  return (
    <div className="agent-bar">
      {AGENTS.map(agent => {
        const info = getAgentInfo(agent.id);
        const status = info.status || 'idle';
        const lastLog = (info.recentLogs || [])[0];
        const timer = timers[agent.id];

        const taskText = status === 'running'
          ? (info.currentTask || 'Working...')
          : lastLog ? lastLog.text : 'Waiting for next run';

        let statusLabel, statusClass;
        if (status === 'running') {
          statusLabel = timer?.elapsed ? `RUN ${timer.elapsed}` : 'RUNNING';
          statusClass = 'running';
        } else if (status === 'error') {
          statusLabel = 'ERROR';
          statusClass = 'error';
        } else if (timer?.countdown) {
          statusLabel = `NEXT ${timer.countdown}`;
          statusClass = 'idle';
        } else {
          statusLabel = 'READY';
          statusClass = 'idle';
        }

        return (
          <div className={`agent-tile ${status}`} key={agent.id}>
            <div className="agent-tile-header">
              <span className="agent-tile-icon">{agent.icon}</span>
              <span className="agent-tile-name">{agent.name}</span>
              <span className={`agent-tile-status-label ${statusClass}`}>{statusLabel}</span>
            </div>
            <div className={`agent-tile-task ${status === 'running' ? 'active' : ''}`}>
              {taskText.length > 80 ? taskText.slice(0, 77) + '...' : taskText}
            </div>
            {/* Progress bar — countdown to next run or elapsed when running */}
            <div style={{ height: '3px', background: '#f1f5f9', borderRadius: '2px', marginTop: '8px', overflow: 'hidden' }}>
              {status === 'running' ? (
                <div style={{ height: '100%', background: 'var(--green)', borderRadius: '2px', width: '100%', animation: 'shimmer 1.5s ease-in-out infinite', backgroundImage: 'linear-gradient(90deg, var(--green) 0%, #4ade80 50%, var(--green) 100%)', backgroundSize: '200% 100%' }}></div>
              ) : timer?.pct != null ? (
                <div style={{ height: '100%', background: timer.pct > 90 ? 'var(--orange)' : 'var(--accent)', borderRadius: '2px', width: `${timer.pct}%`, transition: 'width 1s linear' }}></div>
              ) : null}
            </div>
            <div className="agent-tile-footer" style={{ marginTop: '6px' }}>
              {info.lastRunAt && status !== 'running' && <span>Done {timeAgo(info.lastRunAt)}</span>}
              {status === 'running' && <span style={{ color: 'var(--green)', fontWeight: 600 }}>Working...</span>}
              {info.processedToday > 0 && <span className="agent-tile-count">{info.processedToday} today</span>}
            </div>
            {info.errorMessage && (
              <div style={{ fontSize: '10px', color: 'var(--red)', marginTop: '6px', lineHeight: '1.3' }}>
                {info.errorMessage.length > 60 ? info.errorMessage.slice(0, 57) + '...' : info.errorMessage}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

    return map;
  }, [logs]);

  async function togglePause(agentId, currentlyPaused) {
    setPausingAgent(agentId);
    await convexMutate('agents:setAgentPaused', { agentId, isPaused: !currentlyPaused });
    setPausingAgent(null);
  }

  const liveLog = useMemo(() =>

            }}>
              {/* Header row */}
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: '10px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <div style={{ fontSize: '22px', width: 40, height: 40, borderRadius: 10,
                    background: 'var(--surface2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    {meta.icon}
                  </div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: '14px', marginBottom: 2 }}>{meta.name}</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{meta.schedule}</div>
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <AgentStatusBadge status={status} isPaused={isPaused} />
                  <button
                    onClick={() => togglePause(agentId, isPaused)}
                    disabled={pausingAgent === agentId}
                    className="btn btn-sm btn-ghost"
                    style={{ fontSize: '11px', padding: '3px 8px' }}>
                    {isPaused ? '▶ Resume' : '⏸ Pause'}
                  </button>
                </div>
              </div>

              {/* Description */}
              <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '10px' }}>{meta.desc}</div>

              {/* Progress bar (if running) */}
              {status === 'running' && stat?.currentStep && (
                <div style={{ marginBottom: '10px' }}>
                  <div style={{ fontSize: '11px', color: 'var(--text)', marginBottom: '4px', fontWeight: 500 }}>
                    {stat.stepNumber && stat.totalSteps ? `Step ${stat.stepNumber}/${stat.totalSteps}: ` : ''}{stat.currentStep}
                  </div>
                  {stat.progress != null && (
                    <div style={{ height: 4, background: 'var(--surface2)', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${stat.progress}%`, background: 'var(--green)',
                        borderRadius: 4, transition: 'width 0.5s ease' }} />
                    </div>
                  )}
                </div>
              )}

              {/* Error message */}
              {status === 'error' && stat?.errorMessage && (
                <div style={{ fontSize: '11px', color: 'var(--red)', padding: '6px 8px',
                  background: 'var(--red-bg)', borderRadius: 6, marginBottom: '10px' }}>
                  {stat.errorMessage}
                </div>
              )}

              {/* Stats row */}
              <div style={{ display: 'flex', gap: '14px', fontSize: '11px', color: 'var(--text-dim)',
                borderTop: '1px solid var(--border)', paddingTop: '8px', flexWrap: 'wrap' }}>
                {(stat?.lastCompletedAt || oldState?.lastRunAt) && (
                  <span>Last run: <b style={{ color: 'var(--text)' }}>{timeAgo(stat?.lastCompletedAt || oldState?.lastRunAt)}</b></span>
                )}
                {stat?.todayItems > 0 && (
                  <span>Today: <b style={{ color: 'var(--text)' }}>{stat.todayItems}</b></span>
                )}
                {stat?.successRate != null && (
                  <span>Success: <b style={{ color: stat.successRate > 80 ? 'var(--green)' : 'var(--red)' }}>{stat.successRate}%</b></span>
                )}
                {stat?.avgDurationMs && (
                  <span>Avg: <b style={{ color: 'var(--text)' }}>{Math.round(stat.avgDurationMs / 1000)}s</b></span>
                )}
              </div>

              {/* Recent runs (mini) */}
              {stat?.recentRuns?.length > 0 && (
                <div style={{ marginTop: '8px', borderTop: '1px solid var(--border)', paddingTop: '8px' }}>
                  {stat.recentRuns.slice(0, 3).map((run, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '6px',
                      fontSize: '11px', color: 'var(--text-dim)', marginBottom: '3px' }}>
                      <RunStatusIcon status={run.status} />
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {run.summary || run.status}
                      </span>
                      {run.durationMs && <span>{Math.round(run.durationMs / 1000)}s</span>}
                      <span>{timeAgo(run.startedAt)}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Recent logs */}
              {recentLogs.length > 0 && (
                <div style={{ marginTop: '8px', borderTop: '1px solid var(--border)', paddingTop: '8px' }}>
                  {recentLogs.map((l, i) => (
                    <div key={i} style={{ display: 'flex', gap: '6px', fontSize: '11px',
                      color: l.type === 'error' ? 'var(--red)' : l.type === 'warn' ? 'var(--yellow)' : 'var(--text-dim)',
                      marginBottom: '3px', alignItems: 'flex-start' }}>
                      <span>{l.type === 'ok' ? '✅' : l.type === 'error' ? '❌' : l.type === 'warn' ? '⚠️' : 'ℹ️'}</span>
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{l.text}</span>
                      <span style={{ whiteSpace: 'nowrap', flexShrink: 0 }}>{timeAgo(l.timestamp)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Live Activity Feed */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">📡 Live Activity Feed</div>
          <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Last 60 events · auto-refreshing</div>
        </div>
        <div style={{ maxHeight: '400px', overflowY: 'auto' }}>
          {liveLog.map((l) => {
            const agentColor = {
              researcher: '#7c3aed', builder: '#0891b2', outreach: '#16a34a',
              email: '#2563eb', coordinator: '#d97706', system: '#6b7280',
              'morning-briefing': '#ea580c', enrichment: '#db2777',
            }[l.agentId] || '#6b7280';
            return (
              <div key={l._key} style={{ display: 'flex', alignItems: 'flex-start', gap: '8px',
                padding: '7px 0', borderBottom: '1px solid var(--border)', fontSize: '12px' }}>
                <span style={{ fontSize: '11px', fontWeight: 700, color: agentColor,
                  background: `${agentColor}18`, padding: '2px 7px', borderRadius: 20,
                  whiteSpace: 'nowrap', flexShrink: 0 }}>
                  {l.agentId}
                </span>
                <span style={{ flex: 1, color: l.type === 'error' ? 'var(--red)' : l.type === 'warn' ? 'var(--yellow)' : 'var(--text)' }}>
                  {l.text}
                </span>
                <span style={{ fontSize: '11px', color: 'var(--text-dim)', whiteSpace: 'nowrap', flexShrink: 0 }}>
                  {timeAgo(l.timestamp)}
                </span>
              </div>
            );
          })}
          {liveLog.length === 0 && (
            <div className="empty-state"><div className="empty-state-text">No activity yet</div></div>
          )}
        </div>
      </div>
    </div>
  );
}

// ==================== COORDINATOR ====================
function Coordinator({ agentsDashboard }) {
  const h = agentsDashboard?.health;
  const directives = agentsDashboard?.pendingDirectives || [];
  const recentDirectives = agentsDashboard?.recentDirectives || [];
  const skills = agentsDashboard?.skills || [];
  const learnings = agentsDashboard?.learnings || [];

  const statusCfg = {
    healthy:  { color: 'var(--green)',  bg: 'var(--green-bg)',  label: '✅ Healthy' },
    degraded: { color: 'var(--yellow)', bg: 'var(--yellow-bg)', label: '⚠️ Degraded' },
    critical: { color: 'var(--red)',    bg: 'var(--red-bg)',    label: '🔴 Critical' },
  };
  const sc = statusCfg[h?.status] || statusCfg.healthy;

  function MiniBar({ value, max, color }) {
    const pct = max > 0 ? Math.min(Math.round(value / max * 100), 100) : 0;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
        <div style={{ flex: 1, height: 6, background: 'var(--surface2)', borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${pct}%`, background: color || 'var(--accent)', borderRadius: 4 }} />
        </div>
        <span style={{ fontSize: '11px', color: 'var(--text-dim)', width: 32, textAlign: 'right' }}>{value}</span>
      </div>
    );
  }

  function MetricCard({ label, value, sub, color }) {
    return (
      <div style={{ background: 'var(--surface2)', borderRadius: 10, padding: '12px 14px' }}>
        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: '22px', fontWeight: 800, color: color || 'var(--text)' }}>{value}</div>
        {sub && <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: 2 }}>{sub}</div>}
      </div>
    );
  }

  const directiveLabels = {
    pause: '⏸ Pause',
    resume: '▶ Resume',
    adjust_cap: '⚙️ Adjust Cap',
    update_prompt_snippet: '✏️ Update Prompt',
    trigger_enrichment: '📬 Trigger Enrichment',
    alert_ben: '🔔 Alert Ben',
  };

  const skillTypeColors = {
    opener: '#7c3aed', pitch: '#0891b2', email_opener: '#2563eb',
    email_pitch: '#16a34a', objection_handler: '#d97706', city_targets: '#ea580c', qualifier: '#6b7280',
  };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
        <div className="section-title" style={{ margin: 0 }}>🧠 Coordinator</div>
        {h?.updatedAt && (
          <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>Snapshot · {timeAgo(h.updatedAt)}</div>
        )}
      </div>

      {/* System Health */}
      <div className="card" style={{ marginBottom: '16px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
          <div className="card-title">📊 System Health</div>
          {h && (
            <span style={{ fontSize: '12px', fontWeight: 700, padding: '4px 12px', borderRadius: 20,
              background: sc.bg, color: sc.color }}>{sc.label}</span>
          )}
        </div>

        {h ? (
          <>
            {/* Performance metrics row */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px', marginBottom: '16px' }}>
              <MetricCard label="Reply Rate (24h)" value={`${h.replyRate24h}%`}
                color={h.replyRate24h >= 10 ? 'var(--green)' : h.replyRate24h >= 5 ? 'var(--yellow)' : 'var(--red)'}
                sub={`${h.openersLast24h} sent · ${h.repliesLast24h} replies`} />
              <MetricCard label="Email Enrich" value={`${h.emailEnrichRate}%`}
                color={h.emailEnrichRate >= 50 ? 'var(--green)' : 'var(--yellow)'}
                sub="prospects with emails" />
              <MetricCard label="Builder Velocity" value={`${h.builderVelocity}/hr`}
                color={h.builderVelocity >= 6 ? 'var(--green)' : 'var(--yellow)'}
                sub="sites per hour" />
              <MetricCard label="Flagged" value={h.flagged}
                color={h.flagged > 5 ? 'var(--red)' : h.flagged > 0 ? 'var(--yellow)' : 'var(--green)'}
                sub="need Ben's review" />
            </div>

            {/* Pipeline bars */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
              <div>
                <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase',
                  letterSpacing: '0.5px', marginBottom: '10px' }}>Pipeline Flow</div>
                {[
                  { label: 'In Queue (prospected)', value: h.prospected, max: 60, color: '#7c3aed' },
                  { label: 'Building', value: h.building, max: 20, color: '#0891b2' },
                  { label: 'Deployed (ready)', value: h.deployed, max: 30, color: '#22c55e' },
                  { label: 'Opener Sent', value: h.openerSent, max: 50, color: '#16a34a' },
                  { label: 'Pitch Sent', value: h.pitchSent, max: 30, color: '#d97706' },
                  { label: 'Email Sent', value: h.emailSent, max: 20, color: '#2563eb' },
                ].map(r => (
                  <div key={r.label} style={{ display: 'flex', alignItems: 'center', gap: '8px',
                    fontSize: '12px', marginBottom: '7px' }}>
                    <span style={{ width: 130, color: 'var(--text-dim)', flexShrink: 0 }}>{r.label}</span>
                    <div style={{ flex: 1 }}><MiniBar value={r.value} max={r.max} color={r.color} /></div>
                  </div>
                ))}
              </div>
              <div>
                <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase',
                  letterSpacing: '0.5px', marginBottom: '10px' }}>Outcomes</div>
                {[
                  { label: 'Call Ready', value: h.callReady, max: 10, color: '#f59e0b' },
                  { label: 'Won', value: h.won, max: 20, color: '#16a34a' },
                ].map(r => (
                  <div key={r.label} style={{ display: 'flex', alignItems: 'center', gap: '8px',
                    fontSize: '12px', marginBottom: '7px' }}>
                    <span style={{ width: 130, color: 'var(--text-dim)', flexShrink: 0 }}>{r.label}</span>
                    <div style={{ flex: 1 }}><MiniBar value={r.value} max={r.max} color={r.color} /></div>
                  </div>
                ))}

                {/* Issues */}
                {h.issues?.length > 0 && (
                  <div style={{ marginTop: '12px' }}>
                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase',
                      letterSpacing: '0.5px', marginBottom: '8px' }}>Issues This Run</div>
                    {h.issues.map((issue, i) => (
                      <div key={i} style={{ fontSize: '11px', marginBottom: '5px', padding: '5px 8px', borderRadius: 6,
                        background: issue.severity === 'critical' ? 'var(--red-bg)' : issue.severity === 'warn' ? 'var(--yellow-bg)' : 'var(--blue-bg)',
                        color: issue.severity === 'critical' ? 'var(--red)' : issue.severity === 'warn' ? 'var(--yellow)' : 'var(--blue)' }}>
                        <b>{issue.agent}</b>: {issue.message}
                      </div>
                    ))}
                  </div>
                )}

                {/* Actions this run */}
                {h.actionsThisRun?.length > 0 && (
                  <div style={{ marginTop: '12px' }}>
                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase',
                      letterSpacing: '0.5px', marginBottom: '8px' }}>Actions This Run</div>
                    {h.actionsThisRun.map((action, i) => (
                      <div key={i} style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '3px' }}>
                        → {action}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </>
        ) : (
          <div className="empty-state">
            <div className="empty-state-icon">🧠</div>
            <div className="empty-state-text">No coordinator snapshot yet — will update after first coordinator run</div>
          </div>
        )}
      </div>

      {/* Directives */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
        <div className="card">
          <div className="card-header">
            <div className="card-title">⚡ Active Directives</div>
            {directives.length > 0 && (
              <span style={{ background: 'var(--red-bg)', color: 'var(--red)', fontSize: '11px', fontWeight: 700,
                padding: '2px 8px', borderRadius: 20 }}>{directives.length}</span>
            )}
          </div>
          {directives.length > 0 ? directives.map((d, i) => (
            <div key={i} style={{ padding: '10px', marginBottom: '8px', borderRadius: 8,
              background: 'var(--surface2)', border: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                <span style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)',
                  background: 'rgba(245,194,24,0.15)', padding: '1px 6px', borderRadius: 10 }}>
                  {d.targetAgent}
                </span>
                <span style={{ fontSize: '12px', fontWeight: 600 }}>{directiveLabels[d.directive] || d.directive}</span>
              </div>
              <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{d.reason}</div>
              {d.newValue && <div style={{ fontSize: '11px', color: 'var(--text)', marginTop: 3, fontFamily: 'monospace' }}>{d.newValue}</div>}
              <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: 4 }}>{timeAgo(d.createdAt)}</div>
            </div>
          )) : (
            <div style={{ fontSize: '12px', color: 'var(--text-dim)', textAlign: 'center', padding: '20px' }}>
              No pending directives ✅
            </div>
          )}

          {/* Recent executed */}
          {recentDirectives.filter(d => d.status === 'executed').slice(0, 3).map((d, i) => (
            <div key={i} style={{ padding: '8px 10px', marginBottom: '4px', borderRadius: 8,
              background: 'var(--surface2)', opacity: 0.55, fontSize: '11px', display: 'flex', gap: '8px' }}>
              <span>✅</span>
              <span style={{ flex: 1, color: 'var(--text-dim)' }}><b>{d.targetAgent}</b>: {d.directive}</span>
              <span style={{ color: 'var(--text-dim)' }}>{timeAgo(d.executedAt || d.createdAt)}</span>
            </div>
          ))}
        </div>

        {/* Learnings */}
        <div className="card">
          <div className="card-header">
            <div className="card-title">🔬 Agent Learnings</div>
          </div>
          {learnings.length > 0 ? learnings.map((l, i) => (
            <div key={i} style={{ padding: '10px', marginBottom: '8px', borderRadius: 8,
              background: 'var(--surface2)', border: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                <span style={{ fontSize: '11px', fontWeight: 700, color: '#7c3aed',
                  background: 'rgba(124,58,237,0.10)', padding: '1px 6px', borderRadius: 10 }}>
                  {l.agentId}
                </span>
                <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{l.category}</span>
                <span style={{ marginLeft: 'auto', fontSize: '10px', fontWeight: 700,
                  color: l.confidence === 'high' ? 'var(--green)' : l.confidence === 'medium' ? 'var(--yellow)' : 'var(--text-dim)' }}>
                  {l.confidence}
                </span>
              </div>
              <div style={{ fontSize: '12px', color: 'var(--text)' }}>{l.insight}</div>
              <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: 3 }}>{timeAgo(l.createdAt)}</div>
            </div>
          )) : (
            <div style={{ fontSize: '12px', color: 'var(--text-dim)', textAlign: 'center', padding: '20px' }}>
              No learnings yet — agents will write insights here as they run
            </div>
          )}
        </div>
      </div>

      {/* Skills Library */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">🛠 Skills Library</div>
          <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{skills.length} active skills</div>
        </div>
        {skills.length > 0 ? (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr style={{ borderBottom: '2px solid var(--border)' }}>
                  {['Type', 'Category', 'v', 'Reply%', 'Close%', 'Samples', 'Notes'].map(h => (
                    <th key={h} style={{ textAlign: 'left', padding: '6px 10px', fontWeight: 600,
                      fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.4px' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {skills.sort((a, b) => a.skillType.localeCompare(b.skillType)).map((s, i) => (
                  <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                    <td style={{ padding: '8px 10px' }}>
                      <span style={{ fontSize: '11px', fontWeight: 700,
                        color: skillTypeColors[s.skillType] || 'var(--text-dim)',
                        background: `${skillTypeColors[s.skillType] || '#6b7280'}15`,
                        padding: '2px 7px', borderRadius: 10 }}>{s.skillType}</span>
                    </td>
                    <td style={{ padding: '8px 10px', color: 'var(--text-dim)' }}>{s.category || '—'}</td>
                    <td style={{ padding: '8px 10px', color: 'var(--text-dim)' }}>v{s.version}</td>
                    <td style={{ padding: '8px 10px' }}>
                      {s.replyRate != null
                        ? <span style={{ color: s.replyRate >= 10 ? 'var(--green)' : 'var(--yellow)', fontWeight: 600 }}>{s.replyRate}%</span>
                        : <span style={{ color: 'var(--text-dim)' }}>—</span>}
                    </td>
                    <td style={{ padding: '8px 10px' }}>
                      {s.closeRate != null
                        ? <span style={{ color: 'var(--green)', fontWeight: 600 }}>{s.closeRate}%</span>
                        : <span style={{ color: 'var(--text-dim)' }}>—</span>}
                    </td>
                    <td style={{ padding: '8px 10px', color: 'var(--text-dim)' }}>{s.sampleSize || '—'}</td>
                    <td style={{ padding: '8px 10px', color: 'var(--text-dim)', maxWidth: 200,
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.notes || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="empty-state">
            <div className="empty-state-text">Skills will appear here after coordinator's first run seeds the library</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== ACTIVITY LOG ====================
function ActivityLog({ logs, prospects }) {
  const [filter, setFilter] = useState('all');
  const filtered = useMemo(() => {
    if (filter === 'all') return logs || [];
    return (logs || []).filter(l => l.type === filter);
  }, [logs, filter]);

  return (
    <div>
      <div className="section-title">📋 Activity Log</div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
        {['all', 'ok', 'info', 'warn', 'error'].map(f => (
          <button key={f} className={`btn btn-sm ${filter === f ? '' : 'btn-ghost'}`} onClick={() => setFilter(f)}
            style={filter === f ? { background: 'var(--accent)', borderColor: 'var(--accent)', color: 'white' } : {}}>
            {f === 'all' ? 'All' : f === 'ok' ? '✅ OK' : f === 'info' ? 'ℹ️ Info' : f === 'warn' ? '⚠️ Warn' : '❌ Error'}
          </button>
        ))}
      </div>
      <div className="card">
        {filtered.slice(0, 80).map((log, i) => <LogItem key={i} log={log} />)}
        {filtered.length === 0 && <div className="empty-state"><div className="empty-state-text">No log entries</div></div>}
      </div>
    </div>
  );
}

function LogItem({ log, compact }) {
  const iconMap = { ok: '✅', info: 'ℹ️', warn: '⚠️', error: '❌' };
  const bgMap = { ok: 'var(--green-bg)', info: 'var(--blue-bg)', warn: 'var(--yellow-bg)', error: 'var(--red-bg)' };
  return (
    <div className="log-item" style={compact ? { padding: '6px 0', fontSize: '12px' } : {}}>
      <div className="log-icon" style={{ background: bgMap[log.type] || 'var(--surface2)' }}>
        {iconMap[log.type] || '📝'}
      </div>
      <div className="log-text">{log.text}</div>
      <div className="log-time">{timeAgo(log.timestamp)}</div>
    </div>
  );
}

// ==================== FLAGGED ====================
function FlaggedList({ flagged, onViewConvo, onRefresh }) {
  async function resolve(id, stage) {
    await convexMutate('outreach:resolveFlag', { prospectId: id, newStage: stage });
    onRefresh();
  }

  return (
    <div>
      <div className="section-title">🚩 Flagged for Review ({flagged.length})</div>
      {flagged.map(p => (
        <div key={p._id} className="call-card" style={{ borderLeft: '3px solid var(--yellow)', marginBottom: '10px' }}>
          <div className="call-card-header">
            <div>
              <div className="call-card-name">{p.name}</div>
              <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{p.category} · {p.region}, {p.province}</div>
            </div>
          </div>
          {p.flaggedReason && <div className="call-card-quote">{p.flaggedReason}</div>}
          <div className="call-card-actions">
            <a href={`tel:${p.phone}`} className="btn btn-call btn-sm">📱 Call</a>
            <button className="btn btn-sm" onClick={() => resolve(p._id, 'pitch_sent')}>↩️ Re-pitch</button>
            <button className="btn btn-sm" onClick={() => resolve(p._id, 'lost')}>❌ Lost</button>
            <button className="btn btn-sm btn-ghost" onClick={() => onViewConvo(p)}>💬 Chat</button>
          </div>
        </div>
      ))}
      {flagged.length === 0 && <div className="empty-state"><div className="empty-state-icon">✅</div><div className="empty-state-text">No flagged prospects</div></div>}
    </div>
  );
}

// ==================== HOST4ME VERTICAL ====================
const H4M_STAGES = [
  { key: 'lead', label: 'Lead', color: 'var(--text-dim)', bg: 'var(--surface2)' },
  { key: 'outreach_sent', label: 'Outreach Sent', color: 'var(--blue)', bg: 'var(--blue-bg)' },
  { key: 'demo_booked', label: 'Demo Booked', color: 'var(--cyan)', bg: 'var(--cyan-bg)' },
  { key: 'demo_done', label: 'Demo Done', color: 'var(--yellow)', bg: 'var(--yellow-bg)' },
  { key: 'setup', label: 'Setup', color: 'var(--orange)', bg: 'var(--orange-bg)' },
  { key: 'active', label: 'Active Client', color: 'var(--green)', bg: 'var(--green-bg)' },
  { key: 'churned', label: 'Churned', color: 'var(--red)', bg: 'var(--red-bg)' },
];

const H4M_TIER_LABELS = { starter: '$149/mo', growth: '$299/mo', portfolio: '$499/mo' };

function Host4Me({ addToast }) {
  const [leads, setLeads] = useState(() => {
    try { return JSON.parse(localStorage.getItem('h4m-leads') || '[]'); } catch { return []; }
  });
  const [showForm, setShowForm] = useState(false);
  const [selectedLead, setSelectedLead] = useState(null);
  const [viewMode, setViewMode] = useState('kanban'); // kanban or table

  useEffect(() => { localStorage.setItem('h4m-leads', JSON.stringify(leads)); }, [leads]);

  const addLead = (lead) => {
    const newLead = {
      ...lead,
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      stage: 'lead',
      createdAt: Date.now(),
      notes: '',
      outreachSentAt: null,
      demoBookedAt: null,
      demoDoneAt: null,
      setupStartedAt: null,
      activeAt: null,
      tier: 'growth',
      listings: lead.listings || 5,
    };
    setLeads(l => [...l, newLead]);
    setShowForm(false);
    addToast('🏠 New Host4Me lead added', 'success');
  };

  const updateLead = (id, updates) => {
    setLeads(l => l.map(x => x.id === id ? { ...x, ...updates } : x));
    if (selectedLead?.id === id) setSelectedLead(prev => ({ ...prev, ...updates }));
  };

  const moveStage = (id, newStage) => {
    const timestamps = {};
    if (newStage === 'outreach_sent') timestamps.outreachSentAt = Date.now();
    if (newStage === 'demo_booked') timestamps.demoBookedAt = Date.now();
    if (newStage === 'demo_done') timestamps.demoDoneAt = Date.now();
    if (newStage === 'setup') timestamps.setupStartedAt = Date.now();
    if (newStage === 'active') timestamps.activeAt = Date.now();
    updateLead(id, { stage: newStage, ...timestamps });
    const stageLabel = H4M_STAGES.find(s => s.key === newStage)?.label || newStage;
    addToast(`🏠 Lead moved to ${stageLabel}`, 'info');
  };

  const deleteLead = (id) => {
    setLeads(l => l.filter(x => x.id !== id));
    setSelectedLead(null);
    addToast('Lead removed', 'warn');
  };

  // Stats
  const activeClients = leads.filter(l => l.stage === 'active');
  const h4mMRR = activeClients.reduce((sum, l) => {
    const tier = l.tier || 'growth';
    const amt = tier === 'starter' ? 149 : tier === 'growth' ? 299 : 499;
    return sum + amt;
  }, 0);
  const totalLeads = leads.filter(l => !['churned'].includes(l.stage)).length;
  const demosBooked = leads.filter(l => ['demo_booked', 'demo_done', 'setup', 'active'].includes(l.stage)).length;
  const conversionRate = totalLeads > 0 ? Math.round((activeClients.length / totalLeads) * 100) : 0;

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 800, display: 'flex', alignItems: 'center', gap: 10 }}>🏠 Host4Me <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-dim)' }}>Property Management AI</span></h2>
          <a href="https://host4me.vercel.app" target="_blank" rel="noopener" style={{ fontSize: 12, color: 'var(--accent)', textDecoration: 'none' }}>host4me.vercel.app ↗</a>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-sm" onClick={() => setViewMode(v => v === 'kanban' ? 'table' : 'kanban')}>{viewMode === 'kanban' ? '📋 Table' : '📊 Kanban'}</button>
          <button className="btn btn-call btn-sm" onClick={() => setShowForm(true)}>+ Add Lead</button>
        </div>
      </div>

      {/* Stats Cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: 'var(--green)' }}>${h4mMRR}<span style={{ fontSize: 14, fontWeight: 500, color: 'var(--text-dim)' }}>/mo</span></div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)' }}>Host4Me MRR</div>
        </div>
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 28, fontWeight: 800 }}>{activeClients.length}</div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)' }}>Active Clients</div>
        </div>
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: 'var(--blue)' }}>{totalLeads}</div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)' }}>Total Pipeline</div>
        </div>
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: 'var(--cyan)' }}>{demosBooked}</div>
          <div style={{ fontSize: 12, color: 'var(--text-dim)' }}>Demos Booked</div>
        </div>
      </div>

      {/* Progress to $10K MRR */}
      <div className="card" style={{ padding: 16, marginBottom: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 13 }}>
          <span style={{ fontWeight: 600 }}>Progress to $10K MRR</span>
          <span style={{ color: 'var(--green)', fontWeight: 700 }}>${h4mMRR} / $10,000</span>
        </div>
        <div style={{ height: 8, background: 'var(--surface2)', borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${Math.min((h4mMRR / 10000) * 100, 100)}%`, background: 'linear-gradient(90deg, var(--accent), var(--green))', borderRadius: 4, transition: 'width 0.5s' }} />
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 4 }}>
          {Math.round((h4mMRR / 10000) * 100)}% — need {Math.ceil((10000 - h4mMRR) / 299)} more Growth clients at $299/mo
        </div>
      </div>

      {/* Kanban View */}
      {viewMode === 'kanban' && (
        <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 12 }}>
          {H4M_STAGES.filter(s => s.key !== 'churned').map(stage => {
            const stageLeads = leads.filter(l => l.stage === stage.key);
            return (
              <div key={stage.key} style={{ minWidth: 220, flex: '1 0 220px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10, padding: '6px 10px', background: stage.bg, borderRadius: 8 }}>
                  <span style={{ color: stage.color, fontWeight: 700, fontSize: 13 }}>{stage.label}</span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)', fontWeight: 600, background: 'var(--surface)', padding: '1px 6px', borderRadius: 8 }}>{stageLeads.length}</span>
                </div>
                {stageLeads.map(lead => (
                  <div key={lead.id} className="card" style={{ padding: 12, marginBottom: 8, cursor: 'pointer', transition: 'all 0.15s', borderLeft: `3px solid ${stage.color}` }}
                    onClick={() => setSelectedLead(lead)}>
                    <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{lead.name}</div>
                    {lead.company && <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 4 }}>{lead.company}</div>}
                    <div style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-dim)' }}>
                      <span>🏘️ {lead.listings} listings</span>
                      <span style={{ color: stage.color }}>{H4M_TIER_LABELS[lead.tier] || '$299/mo'}</span>
                    </div>
                    {lead.source && <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 4 }}>via {lead.source}</div>}
                  </div>
                ))}
                {stageLeads.length === 0 && (
                  <div style={{ fontSize: 12, color: 'var(--text-dim)', textAlign: 'center', padding: 20, fontStyle: 'italic' }}>Empty</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Table View */}
      {viewMode === 'table' && (
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: 'var(--surface2)', textAlign: 'left' }}>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Name</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Company</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Listings</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Tier</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Stage</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Added</th>
                <th style={{ padding: '10px 14px', fontWeight: 600 }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {leads.filter(l => l.stage !== 'churned').map(lead => {
                const stg = H4M_STAGES.find(s => s.key === lead.stage);
                return (
                  <tr key={lead.id} style={{ borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={() => setSelectedLead(lead)}>
                    <td style={{ padding: '10px 14px', fontWeight: 600 }}>{lead.name}</td>
                    <td style={{ padding: '10px 14px', color: 'var(--text-dim)' }}>{lead.company || '—'}</td>
                    <td style={{ padding: '10px 14px' }}>{lead.listings}</td>
                    <td style={{ padding: '10px 14px' }}>{H4M_TIER_LABELS[lead.tier]}</td>
                    <td style={{ padding: '10px 14px' }}>
                      <span style={{ padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, background: stg?.bg, color: stg?.color }}>{stg?.label}</span>
                    </td>
                    <td style={{ padding: '10px 14px', color: 'var(--text-dim)', fontSize: 12 }}>{new Date(lead.createdAt).toLocaleDateString()}</td>
                    <td style={{ padding: '10px 14px' }}>
                      <button className="btn btn-sm btn-ghost" onClick={(e) => { e.stopPropagation(); setSelectedLead(lead); }}>View</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {leads.filter(l => l.stage !== 'churned').length === 0 && (
            <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-dim)' }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>🏠</div>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>No Host4Me leads yet</div>
              <div style={{ fontSize: 13 }}>Click "+ Add Lead" to start building your property management pipeline</div>
            </div>
          )}
        </div>
      )}

      {/* Add Lead Modal */}
      {showForm && <Host4MeAddLead onAdd={addLead} onClose={() => setShowForm(false)} />}

      {/* Lead Detail Panel */}
      {selectedLead && <Host4MeLeadPanel lead={selectedLead} onClose={() => setSelectedLead(null)} onMove={moveStage} onUpdate={updateLead} onDelete={deleteLead} />}
    </div>
  );
}

          <div>

            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 4 }}>City</label>
              <input style={{ width: '100%', padding: '8px 12px', border: '1px solid var(--border)', borderRadius: 8, fontSize: 14 }} value={form.city} onChange={e => set('city', e.target.value)} placeholder="Vancouver" />
            </div>
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, display: 'block', marginBottom: 4 }}>Source</label>
            <select style={{ width: '100%', padding: '8px 12px', border: '1px solid var(--border)', borderRadius: 8, fontSize: 14, background: 'var(--surface)' }} value={form.source} onChange={e => set('source', e.target.value)}>

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 20 }}>

function Host4MeLeadPanel({ lead, onClose, onMove, onUpdate, onDelete }) {
  const [notes, setNotes] = useState(lead.notes || '');
  const [tier, setTier] = useState(lead.tier || 'growth');
  const stg = H4M_STAGES.find(s => s.key === lead.stage);
  const stgIdx = H4M_STAGES.findIndex(s => s.key === lead.stage);

  const prevStage = stgIdx > 0 ? H4M_STAGES[stgIdx - 1] : null;

  useEffect(() => { setNotes(lead.notes || ''); setTier(lead.tier || 'growth'); }, [lead.id]);

  return (
    <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 420, background: 'var(--surface)', borderLeft: '1px solid var(--border)', zIndex: 150, boxShadow: '-4px 0 20px rgba(0,0,0,0.08)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{lead.name}</div>
          {lead.company && <div style={{ fontSize: 13, color: 'var(--text-dim)' }}>{lead.company}</div>}
          <span style={{ display: 'inline-block', marginTop: 6, padding: '2px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600, background: stg?.bg, color: stg?.color }}>{stg?.label}</span>
        </div>
        <button style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: 'var(--text-dim)' }} onClick={onClose}>✕</button>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>
        {/* Contact Info */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Contact</div>
          {lead.phone && <div style={{ marginBottom: 4, fontSize: 14 }}>📱 <a href={`tel:${lead.phone}`} style={{ color: 'var(--accent)', textDecoration: 'none' }}>{lead.phone}</a></div>}
          {lead.email && <div style={{ marginBottom: 4, fontSize: 14 }}>📧 <a href={`mailto:${lead.email}`} style={{ color: 'var(--accent)', textDecoration: 'none' }}>{lead.email}</a></div>}
          {lead.city && <div style={{ marginBottom: 4, fontSize: 14 }}>📍 {lead.city}</div>}
          <div style={{ fontSize: 14 }}>🏘️ {lead.listings} listings</div>
        </div>

        {/* Tier Selector */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Pricing Tier</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['starter', 'growth', 'portfolio'].map(t => (
              <button key={t} className={`btn btn-sm ${tier === t ? 'btn-call' : ''}`}
                style={{ flex: 1, fontSize: 12 }}
                onClick={() => { setTier(t); onUpdate(lead.id, { tier: t }); }}>
                {t === 'starter' ? '$149' : t === 'growth' ? '$299' : '$499'}
              </button>
            ))}
          </div>
        </div>

        {/* Timeline */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Timeline</div>
          <div style={{ fontSize: 12, display: 'grid', gap: 4 }}>
            <div>📅 Added: {new Date(lead.createdAt).toLocaleDateString()}</div>
            {lead.outreachSentAt && <div>📤 Outreach: {new Date(lead.outreachSentAt).toLocaleDateString()}</div>}
            {lead.demoBookedAt && <div>📞 Demo Booked: {new Date(lead.demoBookedAt).toLocaleDateString()}</div>}
            {lead.demoDoneAt && <div>✅ Demo Done: {new Date(lead.demoDoneAt).toLocaleDateString()}</div>}
            {lead.setupStartedAt && <div>🔧 Setup: {new Date(lead.setupStartedAt).toLocaleDateString()}</div>}
            {lead.activeAt && <div>🎉 Active: {new Date(lead.activeAt).toLocaleDateString()}</div>}
          </div>
        </div>

        {/* Notes */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-dim)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Notes</div>

            {lead.phone && <a href={`tel:${lead.phone}`} className="btn btn-sm" style={{ textDecoration: 'none' }}>📞 Call</a>}
            <a href="https://calendly.com/benchoi-oktd/30min" target="_blank" className="btn btn-sm" style={{ textDecoration: 'none' }}>📅 Calendly</a>
            <a href="https://host4me.vercel.app" target="_blank" className="btn btn-sm" style={{ textDecoration: 'none' }}>🌐 Landing Page</a>
          </div>
        </div>

        {/* Danger Zone */}
        <div style={{ marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--border)' }}>
          <div style={{ display: 'flex', gap: 8 }}>
            {lead.stage !== 'churned' && <button className="btn btn-sm" style={{ color: 'var(--red)', borderColor: 'var(--red)' }} onClick={() => onMove(lead.id, 'churned')}>Mark Churned</button>}
            <button className="btn btn-sm" style={{ color: 'var(--red)', borderColor: 'var(--red)' }} onClick={() => { if (confirm('Delete this lead?')) deleteLead(lead.id); }}>Delete</button>
          </div>
        </div>
      </div>
    </div>
  );
}
